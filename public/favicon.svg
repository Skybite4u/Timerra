<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0b112c" />
      <stop offset="100%" stop-color="#03040c" />
    </radialGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="9" fill="url(#bg)" />
  <!-- Glowing shadow -->
  <circle cx="16" cy="16" r="9" stroke="url(#glow)" stroke-width="2" fill="none" opacity="0.4" filter="url(#shadow)" />
  <!-- Main Glowing Ring -->
  <circle cx="16" cy="16" r="9" stroke="url(#glow)" stroke-width="1.25" fill="none" />
  <!-- Inner Segment (Hourglass/Infinity structure representation) -->
  <path d="M12 11h8 L16 16 L12 21h8" fill="none" stroke="#22d3ee" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
  <!-- Concentric details -->
  <circle cx="16" cy="16" r="4.5" stroke="#ec4899" stroke-width="0.75" stroke-dasharray="1 1.5" fill="none" />
  <!-- Glowing center energy node -->
  <circle cx="16" cy="16" r="1.5" fill="#ffffff" />
</svg>
